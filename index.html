<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>スマホ対戦ボウリング</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #222;
            color: #fff;
            font-family: sans-serif;
            overflow: hidden;
        }
        #ui-container {
            position: absolute;
            top: 0;
            width: 100%;
            z-index: 10;
        }
        #menu {
            background-color: rgba(0, 0, 0, 0.8);
            padding: 10px;
            text-align: center;
        }
        #menu button, #menu select {
            padding: 8px 16px;
            font-size: 1rem;
            margin: 5px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
        }
        #btn-create-room { background-color: #4CAF50; color: white; }
        #scoreboard {
            display: flex;
            justify-content: space-around;
            padding: 10px;
            font-size: 1.2rem;
            background-color: #111;
            border-bottom: 2px solid #555;
        }
        .active-player {
            color: #ffd700;
            font-weight: bold;
            text-decoration: underline;
        }
        #status-bar {
            text-align: center;
            background-color: #222;
            padding: 5px;
            font-size: 1rem;
            color: #aaa;
        }
        canvas {
            background-color: #deb887;
            display: block;
            margin: 0 auto;
            touch-action: none;
        }
        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            color: #ff4500;
            font-weight: bold;
            text-shadow: 2px 2px 0 #fff, -2px -2px 0 #fff;
            pointer-events: none;
            display: none;
            z-index: 20;
        }
        #room-ui {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #333;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            z-index: 30;
        }
        #room-ui input { padding: 5px; font-size: 1rem; }
        #room-ui button { padding: 5px 10px; font-size: 1rem; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="ui-container">
        <div id="menu">
            <select id="game-mode">
                <option value="normal">普通モード</option>
                <option value="dangerous">デンジャラスモード</option>
            </select>
            <button id="btn-create-room" onclick="showRoomUI()">オンラインルーム作成</button>
        </div>
        <div id="scoreboard">
            <div id="p1-score" class="active-player">Player 1: 0</div>
            <div id="p2-score">Player 2: 0</div>
        </div>
        <div id="status-bar">Frame: 1 | Throw: 1</div>
    </div>
    
    <div id="message">Strike!</div>
    
    <div id="room-ui">
        <h3>ルーム作成・参加</h3>
        <p>※サーバー実装が必要なモックUIです</p>
        <input type="text" id="room-id" placeholder="ルームIDを入力">
        <br>
        <button onclick="joinRoom()">接続する</button>
        <button onclick="closeRoomUI()">閉じる</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const p1ScoreEl = document.getElementById('p1-score');
        const p2ScoreEl = document.getElementById('p2-score');
        const statusBarEl = document.getElementById('status-bar');
        const messageEl = document.getElementById('message');
        const modeSelect = document.getElementById('game-mode');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // ゲーム状態の管理
        let currentPlayer = 1;
        let scores = { 1: 0, 2: 0 };
        let currentFrame = 1;
        let currentThrow = 1; // 1フレームにつき最大2投
        
        let isRolling = false;
        let turnEnded = false;
        let pinsDownThisFrame = 0; // 現在のフレームで倒したピンの総数

        // ボールの設定
        const ball = { x: 0, y: 0, radius: 20, vx: 0, vy: 0, color: '#333' };

        // ピンの設定
        let pins = [];
        const pinRadius = 12;

        // お邪魔アイテム（掃除のおばちゃん）
        const cleaner = {
            x: 50, y: canvas.height * 0.4, width: 60, height: 40, vx: 3, active: false
        };

        function resetBallPosition() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height - 50;
            ball.vx = 0;
            ball.vy = 0;
            isRolling = false;
            turnEnded = false;
        }

        // ピンの配置（三角形の向きを修正：手前が1本、奥が4本）
        function setupPins() {
            pins = [];
            const startX = canvas.width / 2;
            const startY = canvas.height * 0.15; // 画面上部
            const spacingX = 35;
            const spacingY = 30;

            for (let row = 0; row < 4; row++) {
                for (let col = 0; col <= row; col++) {
                    // rowを反転させて、1本ピンが一番手前（Y座標が大きくなる）ようにする
                    const invertedRow = 3 - row;
                    pins.push({
                        x: startX - (row * spacingX / 2) + (col * spacingX),
                        y: startY + (invertedRow * spacingY),
                        startX: startX - (row * spacingX / 2) + (col * spacingX), // デンジャラスモード用
                        active: true
                    });
                }
            }
            pinsDownThisFrame = 0;
        }

        function showMessage(text, duration = 1500) {
            messageEl.innerText = text;
            messageEl.style.display = 'block';
            setTimeout(() => { messageEl.style.display = 'none'; }, duration);
        }

        // 描画処理
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // ガター
            ctx.fillStyle = '#444';
            ctx.fillRect(0, 0, 30, canvas.height);
            ctx.fillRect(canvas.width - 30, 0, 30, canvas.height);

            // お邪魔キャラの描画（デンジャラスモード）
            if (modeSelect.value === 'dangerous') {
                ctx.fillStyle = '#8B4513';
                ctx.fillRect(cleaner.x, cleaner.y, cleaner.width, cleaner.height);
                ctx.fillStyle = '#FFF';
                ctx.font = "20px sans-serif";
                ctx.fillText("🧹", cleaner.x + 15, cleaner.y + 25);
            }

            // ピン
            pins.forEach(pin => {
                if (pin.active) {
                    ctx.beginPath();
                    ctx.arc(pin.x, pin.y, pinRadius, 0, Math.PI * 2);
                    ctx.fillStyle = '#fff';
                    ctx.fill();
                    ctx.strokeStyle = '#f00';
                    ctx.lineWidth = 4;
                    ctx.stroke();
                }
            });

            // ボール
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = ball.color;
            ctx.fill();
        }

        // 物理演算
        function update() {
            // デンジャラスモードのギミック
            if (modeSelect.value === 'dangerous') {
                // おばちゃんの移動
                cleaner.x += cleaner.vx;
                if (cleaner.x < 30 || cleaner.x + cleaner.width > canvas.width - 30) {
                    cleaner.vx *= -1;
                }
                // ピンが左右に揺れる
                const time = Date.now() / 300;
                pins.forEach(pin => {
                    if (pin.active) pin.x = pin.startX + Math.sin(time + pin.y) * 10;
                });
            } else {
                // 普通モードに戻した時用にピンの位置をリセット
                pins.forEach(pin => {
                    if (pin.active) pin.x = pin.startX;
                });
            }

            if (isRolling) {
                ball.x += ball.vx;
                ball.y += ball.vy;
                ball.vx *= 0.98;
                ball.vy *= 0.98;

                // ガター判定
                if (ball.x - ball.radius < 30 || ball.x + ball.radius > canvas.width - 30) {
                    ball.vx *= -0.5;
                }

                // お邪魔キャラとの当たり判定
                if (modeSelect.value === 'dangerous') {
                    if (ball.x > cleaner.x && ball.x < cleaner.x + cleaner.width &&
                        ball.y > cleaner.y && ball.y < cleaner.y + cleaner.height) {
                        ball.vy *= -0.8; // 弾かれる
                        ball.vx += cleaner.vx * 0.5;
                    }
                }

                // ピンとの当たり判定
                pins.forEach(pin => {
                    if (pin.active) {
                        const dx = ball.x - pin.x;
                        const dy = ball.y - pin.y;
                        const distance = Math.sqrt(dx * dx + dy * dy);

                        if (distance < ball.radius + pinRadius) {
                            pin.active = false;
                            ball.vx *= 0.85;
                            ball.vy *= 0.85;
                        }
                    }
                });

                // 停止判定
                if ((Math.abs(ball.vx) < 0.1 && Math.abs(ball.vy) < 0.1) || ball.y < -50) {
                    if (!turnEnded) {
                        turnEnded = true;
                        setTimeout(processTurnEnd, 1000);
                    }
                }
            }
        }

        // ターン終了のロジック（10フレームルール）
        function processTurnEnd() {
            const standingPins = pins.filter(p => p.active).length;
            const knockedThisThrow = 10 - pinsDownThisFrame - standingPins;
            pinsDownThisFrame += knockedThisThrow;
            
            scores[currentPlayer] += knockedThisThrow;
            updateScoreUI();

            if (pinsDownThisFrame === 10) {
                // ストライクまたはスペア
                showMessage(currentThrow === 1 ? "Strike!!" : "Spare!");
                nextPlayerTurn();
            } else if (currentThrow === 1) {
                // 1投目でピンが残った場合、2投目へ（ピンはそのまま）
                currentThrow = 2;
                updateStatusUI();
                resetBallPosition();
            } else {
                // 2投目終了
                nextPlayerTurn();
            }
        }

        function nextPlayerTurn() {
            if (currentPlayer === 1) {
                currentPlayer = 2;
                currentThrow = 1;
            } else {
                // Player 2のターンが終わったら次のフレームへ
                currentPlayer = 1;
                currentThrow = 1;
                currentFrame++;
                
                if (currentFrame > 10) {
                    endGame();
                    return;
                }
            }
            
            setupPins(); // 新しいターン/フレームなのでピンを再配置
            updateScoreUI();
            updateStatusUI();
            resetBallPosition();
        }

        function endGame() {
            let winner = scores[1] > scores[2] ? "Player 1" : (scores[2] > scores[1] ? "Player 2" : "Draw");
            showMessage(`Game Over!\n${winner} Wins!`, 5000);
            setTimeout(() => {
                scores = { 1: 0, 2: 0 };
                currentFrame = 1;
                currentPlayer = 1;
                currentThrow = 1;
                setupPins();
                updateScoreUI();
                updateStatusUI();
                resetBallPosition();
            }, 5000);
        }

        function updateScoreUI() {
            p1ScoreEl.innerText = `Player 1: ${scores[1]}`;
            p2ScoreEl.innerText = `Player 2: ${scores[2]}`;
            if (currentPlayer === 1) {
                p1ScoreEl.classList.add('active-player');
                p2ScoreEl.classList.remove('active-player');
            } else {
                p2ScoreEl.classList.add('active-player');
                p1ScoreEl.classList.remove('active-player');
            }
        }

        function updateStatusUI() {
            statusBarEl.innerText = `Frame: ${currentFrame} | Throw: ${currentThrow}`;
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        // 操作処理
        let startY, startX, startTime;

        canvas.addEventListener('touchstart', (e) => {
            if (isRolling) return;
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
            startTime = Date.now();
        });

        canvas.addEventListener('touchend', (e) => {
            if (isRolling) return;
            const endX = e.changedTouches[0].clientX;
            const endY = e.changedTouches[0].clientY;
            const timeDiff = Date.now() - startTime;
            const dy = endY - startY;
            const dx = endX - startX;

            if (dy < -20 && timeDiff < 1000) {
                ball.vx = (dx / timeDiff) * 5;
                ball.vy = (dy / timeDiff) * 15;
                isRolling = true;
            }
        });

        // PCでのマウス操作テスト用
        let isMouseDown = false;
        canvas.addEventListener('mousedown', (e) => {
            if (isRolling) return;
            isMouseDown = true;
            startX = e.clientX;
            startY = e.clientY;
            startTime = Date.now();
        });
        canvas.addEventListener('mouseup', (e) => {
            if (!isMouseDown || isRolling) return;
            isMouseDown = false;
            const dy = e.clientY - startY;
            const dx = e.clientX - startX;
            const timeDiff = Date.now() - startTime;
            if (dy < -20 && timeDiff < 1000) {
                ball.vx = (dx / timeDiff) * 5;
                ball.vy = (dy / timeDiff) * 15;
                isRolling = true;
            }
        });

        // ルーム機能モックUI
        function showRoomUI() { document.getElementById('room-ui').style.display = 'block'; }
        function closeRoomUI() { document.getElementById('room-ui').style.display = 'none'; }
        function joinRoom() {
            const roomId = document.getElementById('room-id').value;
            if(roomId) {
                alert(`ルーム ${roomId} に接続中... (※実装するにはWebSocketサーバー等のバックエンドが必要です)`);
                closeRoomUI();
                // 実際の実装例：
                // socket = io('https://your-server.com');
                // socket.emit('joinRoom', roomId);
            }
        }

        // 初期化
        resetBallPosition();
        setupPins();
        loop();

    </script>
</body>
</html>
